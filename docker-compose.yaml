x-app-env: &app-env
  ENV: dev
  FASTAPI_ENV: dev
  FASTAPI_TITLE: FastAPI Demo
  DEBUG: "true"
  SERVER_IP: localhost
  DATABASE_URL: mysql+pymysql://root:root@db:3306/fastapi_demo
  JWT_KEY: dev-jwt-secret-key-for-docker-compose-minimum-32chars
  SESSIONMIDDLEWARE_SECRET_KEY: dev-session-secret-key-for-docker-min32
  BROKER_URL: redis://redis:6379/0
  CELERY_RESULT_BACKEND: redis://redis:6379/1
  CACHE_SERVER_HOST: redis
  CACHE_SERVER_PORT: "6379"
  S3_ENDPOINT_URL: http://minio:9000
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin
  S3_BUCKET_NAME: avatars
  S3_PUBLIC_URL: http://localhost:9000
  MQTT_BROKER_HOST: mosquitto
  MQTT_BROKER_PORT: "1883"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  OTEL_EXPORTER_ENDPOINT: http://jaeger:4317
  CORS_ORIGINS: http://localhost,http://localhost:3000,http://localhost:8000

x-app-service: &app-service
  build: .
  image: fastapi-demo:dev
  environment:
    <<: *app-env
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
    minio:
      condition: service_started
    mosquitto:
      condition: service_started
    kafka:
      condition: service_started

services:
  backend:
    <<: *app-service
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/root"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery-worker:
    <<: *app-service
    command: python -m celery -A app.tasks worker --loglevel=info --concurrency=2

  celery-beat:
    <<: *app-service
    command: python -m celery -A app.tasks beat --loglevel=info

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fastapi_demo
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/tmp/kraft-combined-logs

  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    mem_limit: 128m

volumes:
  mysql_data:
  minio_data:
  mosquitto_data:
  kafka_data:
